
services:

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db


  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - MONGO_HOST=db 
      - MONGO_PORT=27017
      - MONGO_DB=product_db
    depends_on:
      - db

volumes:
  mongodb_data: